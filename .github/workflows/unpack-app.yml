name: Unpack astronomy app

on:
  push:
    paths:
      - '.astro-ready'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unpack application
        shell: bash
        run: |
          cat .astro-package.part-* | base64 --decode > astronomy-app.zip
          unzip -o astronomy-app.zip
          rm -f .astro-package.part-* .astro-ready astronomy-app.zip
          touch .nojekyll

      - name: Commit application files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish astronomy quiz" || exit 0
          git push
