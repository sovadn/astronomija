name: Embed mobile UI assets

on:
  push:
    paths:
      - .github/workflows/embed-mobile-v11.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Embed versioned mobile assets into index.html
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          css = '<link rel="stylesheet" href="mobile-v9.css?v=11">'
          js = '<script src="mobile-v9.js?v=11"></script>'

          # Remove older directly embedded version tags if they exist.
          import re
          s = re.sub(r'<link rel="stylesheet" href="mobile-v9\.css\?v=\d+">', '', s)
          s = re.sub(r'<script src="mobile-v9\.js\?v=\d+"></script>', '', s)

          s = s.replace('</head>', css + '\n</head>')
          s = s.replace('</body>', js + '\n</body>')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit patched index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Embed mobile UI assets directly in index"
          git push
